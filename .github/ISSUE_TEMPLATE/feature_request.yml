name: Feature Request
description: Request a new integration or feature
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package (or "new integration")
      options:
        - latchgate-langchain
        - latchgate-crewai
        - "@latchgate/ai-sdk"
        - latchgate-openai-agents
        - latchgate-pydantic-ai
        - New integration
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see? What's the use case?
    validations:
      required: true
