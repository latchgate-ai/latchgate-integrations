      prefix: "deps(py)"
    groups:
      python-minor-patch:
        update-types: [minor, patch]

  # Python — openai-agents
  - package-ecosystem: pip
    directory: /openai-agents
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
