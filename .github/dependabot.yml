        update-types: [minor, patch]

  # Python — pydantic
  - package-ecosystem: pip
    directory: /pydantic
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: "deps(py)"
    groups:
      python-minor-patch:
        update-types: [minor, patch]
